# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = ydotoold

# Disable screensaver/idle lock
exec-once = sleep 1 && killall -q hypridle

# Add dotfiles/private/bin to systemd user PATH for waybar/uwsm-app
exec-once = systemctl --user set-environment PATH="$HOME/dotfiles/private/bin:$HOME/dotfiles/bin:$PATH"

# OS Agent - opens terminal attached to os-agent tmux session
# (session is created by os-agent.service systemd unit)
exec-once = sleep 2 && os-agent-attach

# Restart waybar after env is propagated (fixes scroll not working on boot)
exec-once = sleep 2 && killall -q waybar && uwsm-app -- waybar
