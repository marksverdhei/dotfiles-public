# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = ydotoold

# Disable screensaver/idle lock
exec-once = sleep 1 && killall -q hypridle

# Restart waybar after env is propagated (fixes scroll not working on boot)
exec-once = sleep 2 && killall -q waybar && uwsm-app -- waybar

# OBS minimized to tray with replay buffer armed — primes the clip-that path
# Disabled: 4x 2560x1440 screen captures saturate GPU and cause cursor lag
# exec-once = uwsm-app -- obs --minimize-to-tray --startreplaybuffer

# Branded desktop toasts for every inter-agent director message.
# Single watcher tails director's send log → notify-agent (sender avatar = icon).
exec-once = uwsm-app -- ~/dotfiles/bin/director-notify

