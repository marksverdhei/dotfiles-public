# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = ydotoold

# Disable screensaver/idle lock
exec-once = sleep 1 && killall -q hypridle

# Restart waybar after env is propagated (fixes scroll not working on boot)
exec-once = sleep 2 && killall -q waybar && uwsm-app -- waybar

