# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = xdg-terminal-exec
$browser = omarchy-launch-browser

# bindd = SUPER, RETURN, Terminal, exec, ~/.local/bin/alacritty-random --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, code:36, Terminal, exec, ~/.local/bin/alacritty-random --working-directory="$(omarchy-cmd-terminal-cwd)"  # keycode for RETURN (multi-layout fix)
# Alternate terminal keybind that doesn't require Super key
bindd = CTRL ALT, T, Terminal (fallback), exec, alacritty
bindd = SUPER SHIFT, F, File manager, exec, nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, F, Toggle Firefox chrome, exec, firefox-toggle-chrome
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Discord, exec, omarchy-launch-or-focus vesktop vesktop
# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"

# Override SPACE bindings with keycodes (0.53+ multi-layout fix)
# Original key name versions (for reference if keycodes change):
# bindd = SUPER, SPACE, Launch apps, exec, omarchy-launch-walker
# bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, omarchy-toggle-waybar
# bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
# bindd = SUPER CTRL, SPACE, Next background in theme, exec, omarchy-theme-bg-next
unbind = SUPER, SPACE
unbind = SUPER SHIFT, SPACE
unbind = SUPER ALT, SPACE
unbind = SUPER CTRL, SPACE
bindd = SUPER, code:65, Launch apps, exec, omarchy-launch-walker
bindd = SUPER SHIFT, code:65, Toggle top bar, exec, omarchy-toggle-waybar
bindd = SUPER ALT, code:65, Omarchy menu, exec, omarchy-menu
bindd = SUPER CTRL, code:65, Next background in theme, exec, omarchy-theme-bg-next

# Screenshots
bindd = SUPER SHIFT, S, Screenshot region, exec, hyprshot -m region
bindd = , Print, Screenshot full screen, exec, hyprshot -m output
bindd = SUPER, Print, Screenshot window, exec, hyprshot -m window

# Switch keyboard layout (us/no)
bindd = SUPER, GRAVE, Switch keyboard layout, exec, hyprctl switchxkblayout all next
bindd = SUPER, code:34, Toggle keyboard (no/en), exec, hyprctl switchxkblayout all next

# Unbind Omarchy defaults that conflict with vim keys
unbind = SUPER, J  # was: toggle split
unbind = SUPER, K  # was: show keybindings

# Relocated bindings
bindd = SUPER SHIFT, slash, Show key bindings, exec, omarchy-menu-keybindings

# Vim-style window navigation
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, J, Move focus down, movefocus, d
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, L, Move focus right, movefocus, r

# Vim-style window swapping
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r

# Resize with ALT
bindd = SUPER ALT, H, Resize left, resizeactive, -100 0
bindd = SUPER ALT, J, Resize down, resizeactive, 0 100
bindd = SUPER ALT, K, Resize up, resizeactive, 0 -100
bindd = SUPER ALT, L, Resize right, resizeactive, 100 0

# Move workspace to monitor (vim keys)
bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Unbind conflicting defaults for vim-style monitor movement
unbind = SUPER CTRL, L  # was: Lock system (relocated below)

# Move window to monitor (vim keys)
bindd = SUPER CTRL, H, Move window to left monitor, movewindow, mon:l
bindd = SUPER CTRL, J, Move window to down monitor, movewindow, mon:d
bindd = SUPER CTRL, K, Move window to up monitor, movewindow, mon:u
bindd = SUPER CTRL, L, Move window to right monitor, movewindow, mon:r

# Relocated: Lock system (was SUPER CTRL L)
bindd = SUPER SHIFT CTRL, L, Lock system, exec, omarchy-lock-screen

# Toggle border on focused window
bindd = SUPER, B, Toggle border, exec, hyprctl setprop active noborder toggle

# Launch app and swap into current position (new window replaces focused)
# Usage: hypr-launch-swap <command>
# Example keybind - launch terminal in current position:
# bindd = SUPER CTRL, RETURN, Terminal (swap), exec, hypr-launch-swap alacritty
bindd = SUPER CTRL, code:36, Terminal (swap), exec, hypr-launch-swap alacritty  # keycode for RETURN

# Vibe mode toggle (transparent windows for shader wallpaper vs normal opaque)
bindd = SUPER SHIFT, V, Toggle vibe mode, exec, ~/dotfiles/bin/hypr-toggle-vibe

# Zoom (magnify entire UI)
bindd = SUPER CTRL, equal, Zoom in, exec, ~/dotfiles/bin/hypr-zoom in
bindd = SUPER CTRL, minus, Zoom out, exec, ~/dotfiles/bin/hypr-zoom out
bindd = SUPER CTRL, 0, Reset zoom, exec, ~/dotfiles/bin/hypr-zoom reset

bindd = SUPER, TAB, Cycle windows, cyclenext

# QEMU VM passthrough — Super+Alt+V to enter, same to escape
bindd = SUPER ALT, V, VM passthrough, submap, vm-passthrough
submap = vm-passthrough
bindd = SUPER ALT, V, Exit VM passthrough, submap, reset
submap = reset
