# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/autostart.conf

# Private config (keybinds, autostart, etc.)
source = ~/dotfiles/private/omarchy/keybinds.conf
source = ~/dotfiles/private/hypr/autostart.conf
source = ~/dotfiles/private/hypr/bindings.conf

# Monitors (symlinked by dotfiles/private/omarchy/init.sh to the machine's
# monitors config when one exists; empty placeholder otherwise)
source = ~/.config/hypr/monitors.conf

# Dwindle layout (natural splitting)
general {
    layout = dwindle
    gaps_in = 5
    gaps_out = 12

    # Border colors are OWNED BY THE THEME (current/theme/hyprland.conf,
    # sourced above) so switching themes retints the glow — the hardcoded hai
    # cyan that used to live here overrode every theme (Markus 2026-07-19).
}

animations {
    # Disabled: continuous 30fps border redraw causes cursor lag on NVIDIA Wayland
    # animation = borderangle, 1, 30, linear, loop
}

dwindle {
    preserve_split = true
}

# hyprwinwrap - run any app as wallpaper
# plugin = ~/.local/share/hyprland/plugins/libhyprwinwrap.so
exec-once = hyprpm reload -n
plugin {
    hyprwinwrap {
        class = wallpaper
    }

    liquid-glass {
        blur_strength = 0.5
        refraction_strength = 0.02
        chromatic_aberration = 0.003
        fresnel_strength = 0.25
        specular_strength = 0.15
        edge_thickness = 0.03
    }
}

# Vibe shader windows - full opacity so they're visible
windowrule = opacity 1.0 1.0, match:title ^(vibe.*)$

# Live subtitles overlay: eww's :clickthrough is unimplemented (issue #896),
# and this Hyprland version doesn't accept ignorealpha/ignorezero as
# layerrules. The overlay is left without a clickthrough rule for now.

# Director TUI (Super+D launches `omarchy-launch-tui director-tui` which
# spawns alacritty with --class=org.omarchy.director-tui). Omarchy's
# upstream `tag +floating-window` rule in apps/system.conf enumerates each
# org.omarchy.* class by name (btop, bluetui, terminal, …) and does NOT
# include director-tui — so the window otherwise tiles at whatever shrunk
# size it inherits and renders empty because the ratatui layout can't fit
# in ~386x418px. Tagging it floating-window picks up the existing float +
# center + size 875x600 chain. Markus 2026-06-02.
windowrule = tag +floating-window, match:class ^(org\.omarchy\.director-tui)$

# hypr3d - 3D effects plugin (disabled - uncomment to enable)
# plugin = ~/.local/share/hyprland/plugins/libhypr3d.so
#
# plugin {
#     hypr3d {
#         enabled = true
#         perspective {
#             enabled = true
#             depth_scale = 0.65
#             max_depth = 4
#             opacity_falloff = 0.25
#         }
#         cube {
#             enabled = true
#             duration_ms = 500
#             fov = 70.0
#             zoom_out = 0.7
#         }
#         window_anim {
#             enabled = true
#             open_style = flip
#             close_style = shrinkrot
#         }
#         dof {
#             enabled = true
#             unfocus_blur_max = 6
#         }
#         overview {
#             enabled = true
#             columns = 4
#             perspective_tilt = 15.0
#         }
#     }
# }
#
# bind = SUPER, TAB, hypr3d:overview_toggle,
# bind = SUPER CTRL, Right, hypr3d:cube_next,
# bind = SUPER CTRL, Left, hypr3d:cube_prev,

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.94

    # Focused-window halo ("backlight") is OWNED BY THE THEME: HaiOS variants
    # ship an accent-tinted shadow{} in current/theme/hyprland.conf, and stock
    # themes fall back to omarchy looknfeel's neutral one. The hardcoded cyan
    # halo that used to live here overrode every theme (Markus 2026-07-19).

    # Modest bump only — liquid-glass is already active and these are NVIDIA boxes.
    blur {
        enabled = true
        size = 4
        passes = 3
        vibrancy = 0.16
    }
}

# Machine-specific overrides (GPU env vars, accent border colours, vibe mode,
# etc.) — symlinked by dotfiles/private/omarchy/init.sh to
# private/hypr/machines/<hostname>.conf. Sourced LAST so machine settings
# override everything above (a source earlier in the file would lose to the
# general/decoration blocks that follow it).
source = ~/.config/hypr/machine.conf
