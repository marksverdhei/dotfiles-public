set -sg escape-time 0
set -g  default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g  focus-events on
set -g  mouse on
set -g  allow-passthrough on
set -g  set-clipboard off

# Allow Ctrl+click to pass through to terminal (for opening URLs)
unbind -n C-MouseDown1Pane
unbind -n C-MouseDrag1Pane

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

##### navigation ########################################################
# Vim-style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

##### theme (Omarchy Dynamic) ##########################################
set -g status-style "bg=default,fg=default"
set -g pane-border-style "fg=brightblack"

##### plugins ###########################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# TPM
run '~/.tmux/plugins/tpm/tpm'

##### GPU status (live updates) #########################################
set -g status-interval 2
set -g status-right-length 150

# Apply Dynamic Host Color Theme
run-shell '~/dotfiles/bin/omarchy-tmux-theme'

##### splitting preserves cwd ##########################################
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

##### window merging ####################################################
# Merge current window into the window on the left (horizontal split)
bind M join-pane -h -t :-1

# Interactive picker: choose which window to merge current pane into
bind W choose-tree -w "join-pane -h -t '%%'"
