set -sg escape-time 0
set -g  default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g  focus-events on
set -g  mouse on
set -g  allow-passthrough on
set -g  set-clipboard off

##### deterministic base ################################################
# Explicitly own every global option the Omarchy default sets, so NONE of
# them can leak from an already-running (Omarchy-configured) server when this
# file is sourced on top of it. Reloading only overrides options we name —
# anything we leave unset keeps the server's stale value. See dotfiles #9 /
# hai-os #143. (Cosmetic/status/colour options are owned by the theme script
# below; these are the behavioural ones.)
setw -g mode-keys vi
set  -g history-limit 50000
setw -g aggressive-resize on
set  -g detach-on-destroy off
set  -g extended-keys on
set  -g extended-keys-format csi-u
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# Allow Ctrl+click to pass through to terminal (for opening URLs)
unbind -n C-MouseDown1Pane
unbind -n C-MouseDrag1Pane

# Prefix — single leader on C-Space; clear tmux's default C-b AND any
# prefix2 (Omarchy's default sets prefix2 C-b, which would double the leader).
unbind C-b
set -g prefix C-Space
set -g prefix2 None
bind C-Space send-prefix

##### navigation ########################################################
# Vim-style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

##### theme (Omarchy Dynamic) ##########################################
set -g status-style "bg=default,fg=default"
set -g pane-border-style "fg=brightblack"

##### plugins ###########################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect & Continuum settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM
run '~/.tmux/plugins/tpm/tpm'

##### GPU status (live updates) #########################################
set -g status-interval 2
set -g status-right-length 150
# Status bar at the bottom (pane-border labels are the top "header"; Omarchy's
# default sets status-position top, which sticks on a live server — pin it).
set -g status-position bottom

# Apply Dynamic Host Color Theme
run-shell '~/dotfiles/bin/omarchy-tmux-theme'

##### splitting preserves cwd ##########################################
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

##### window merging ####################################################
# Merge current window into the window on the left (horizontal split)
bind M join-pane -h -t :-1

# Interactive picker: choose which window to merge current pane into
bind W choose-tree -w "join-pane -h -t '%%'"
